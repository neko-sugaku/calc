<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <!-- 数式処理ライブラリ (nerdamer) を追加 -->
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/nerdamer.core.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Algebra.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Calculus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nerdamer@1.1.13/Solve.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; height: 100vh; margin: 0; padding: 0; overflow: hidden; }
        
        .calc-btn { 
            transition: all 0.05s; 
            user-select: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
        }
        .calc-btn:active { transform: scale(0.95); filter: brightness(0.9); }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; background: white; }
        
        #display-input-editor {
            width: 100%;
            text-align: right;
            font-size: 1.8rem;
            font-weight: 700;
            color: black;
            outline: none;
            min-height: 3rem;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
            padding: 8px 12px;
            background: transparent;
            line-height: 1.2;
        }

        .math-frac {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            font-size: 0.85em;
            margin: 0 4px;
            line-height: 1.1;
        }
        .math-frac .num { border-bottom: 2px solid currentColor; padding: 0 2px; }

        .input-frac {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            font-size: 0.75em;
            margin: 0 2px;
            border: 1px solid #cbd5e1;
            padding: 2px;
            border-radius: 4px;
            background: #fff;
            line-height: 1.2;
            min-width: 30px;
        }
        .input-frac .num, .input-frac .den {
            min-width: 15px;
            outline: none;
            padding: 0 2px;
            display: block;
        }
        .input-frac .num { border-bottom: 1.5px solid #64748b; }

        .tight-grid { gap: 0; background-color: #e5e7eb; grid-template-columns: repeat(5, 1fr); height: 100%; }
        
        .stats-card { background: white; border-radius: 8px; padding: 12px; border: 1px solid #e5e7eb; width: 100%; }
        .data-input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px; font-family: 'Roboto Mono', monospace; font-size: 0.9rem; min-height: 60px; resize: vertical;}
        
        #stat-freq-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        #stat-freq-table th, #stat-freq-table td { border: 1px solid #cbd5e1; padding: 6px 4px; font-size: 0.85rem; text-align: center; }
        #stat-freq-table th { background-color: #f8fafc; font-weight: bold; }
        #stat-freq-table tr.total-row { background-color: #f1f5f9; font-weight: bold; }

        .summary-text { font-family: 'Roboto Mono', monospace; font-size: 0.85rem; white-space: pre; line-height: 1.6; }
        
        #msg-box { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; display: none; z-index: 1000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

        .py-answer-mode { background-color: #dbeafe !important; color: #1e40af !important; border: 2px solid #3b82f6 !important; }

        @media (max-width: 768px) {
            #main-container { flex-direction: column; height: 100vh; overflow-y: auto; }
            #history-container { width: 100%; height: auto; min-height: 200px; border-left: none; border-top: 1px solid #e5e7eb; flex-shrink: 0; }
            .tight-grid { min-height: 350px; }
            #main-content { height: auto; flex: none; }
        }
    </style>
</head>
<body>

    <div id="msg-box"></div>

    <div id="main-container" class="flex w-full h-screen bg-white shadow-xl overflow-hidden">
        
        <!-- Main Area -->
        <div class="flex-1 flex flex-col min-w-0 h-full overflow-hidden border-r">
            <!-- Tabs -->
            <div class="flex border-b text-sm shrink-0 bg-gray-50">
                <button onclick="switchTab('scientific')" id="tab-scientific" class="flex-1 py-4 text-center font-bold tab-active">電卓</button>
                <button onclick="switchTab('pythagoras')" id="tab-pythagoras" class="flex-1 py-4 text-center font-bold text-gray-500">三平方</button>
                <button onclick="switchTab('stats')" id="tab-stats" class="flex-1 py-4 text-center font-bold text-gray-500">データ活用</button>
                <button onclick="switchTab('random')" id="tab-random" class="flex-1 py-4 text-center font-bold text-gray-500">抽出</button>
            </div>

            <!-- Display Area -->
            <div id="display-section" class="p-4 bg-white shrink-0">
                <div id="display-container" class="bg-gray-50 p-4 rounded-xl border flex flex-col justify-end min-h-[150px]">
                    <div id="sci-display-wrapper">
                        <div id="display-input-editor" contenteditable="true" spellcheck="false">0</div>
                        <div id="math-result-area" class="mt-2 text-3xl font-bold text-blue-600 min-h-[1.5em] flex justify-end items-center text-right break-all"></div>
                    </div>
                    
                    <div id="py-display-wrapper" class="hidden">
                        <div class="grid grid-cols-3 gap-3">
                            <div class="text-center">
                                <label class="text-[10px] font-bold text-gray-500 uppercase">底辺 a</label>
                                <input type="text" id="py-a" class="w-full border p-4 text-center rounded-xl text-xl font-bold bg-white outline-none" oninput="handlePyInput('a')" onfocus="handlePyFocus('a')">
                            </div>
                            <div class="text-center">
                                <label class="text-[10px] font-bold text-gray-500 uppercase">高さ b</label>
                                <input type="text" id="py-b" class="w-full border p-4 text-center rounded-xl text-xl font-bold bg-white outline-none" oninput="handlePyInput('b')" onfocus="handlePyFocus('b')">
                            </div>
                            <div class="text-center">
                                <label class="text-[10px] font-bold text-gray-500 uppercase">斜辺 c</label>
                                <input type="text" id="py-c" class="w-full border p-4 text-center rounded-xl text-xl font-bold bg-white outline-none" oninput="handlePyInput('c')" onfocus="handlePyFocus('c')">
                            </div>
                        </div>
                    </div>

                    <div id="random-display-wrapper" class="hidden text-right">
                        <div id="random-results" class="text-2xl font-bold text-blue-700 break-all mb-2 min-h-[3rem]">抽出結果...</div>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div id="main-content" class="flex-1 relative overflow-hidden bg-white">
                <div id="calc-buttons-container" class="h-full">
                    <div id="button-grid" class="grid tight-grid"></div>
                </div>

                <div id="stats-content" class="hidden absolute inset-0 bg-white overflow-y-auto p-4 space-y-4">
                    <div class="stats-card">
                        <h4 class="text-xs font-bold text-gray-500 mb-2">数値データ入力 (カンマまたはスペース区切り)</h4>
                        <textarea id="stats-data-input" class="data-input" placeholder="例: 10, 20, 30..." oninput="updateStats()"></textarea>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                        <div class="stats-card lg:col-span-2">
                            <div class="flex items-center justify-between mb-4">
                                <h4 class="text-sm font-bold">ヒストグラム / 多角形</h4>
                                <div class="flex items-center gap-4">
                                    <div class="flex items-center gap-1 text-xs">階級幅: <input type="number" id="bin-width-input" value="10" class="w-12 border px-1" oninput="updateStats()"></div>
                                    <label class="flex items-center gap-1 text-xs"><input type="checkbox" id="show-freq-poly" onchange="updateStats()"> 折れ線表示</label>
                                </div>
                            </div>
                            <div class="h-64"><canvas id="stats-chart"></canvas></div>
                        </div>
                        <div class="stats-card">
                            <h4 class="text-sm font-bold mb-2">度数分布表</h4>
                            <div class="overflow-y-auto max-h-64"><table id="stat-freq-table"></table></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div class="stats-card h-80">
                            <h4 class="text-sm font-bold mb-2">箱ひげ図</h4>
                            <div class="h-full"><canvas id="box-plot-canvas"></canvas></div>
                        </div>
                        <div class="stats-card">
                            <h4 class="text-sm font-bold mb-2">統計サマリー</h4>
                            <div id="stats-summary-list" class="summary-text p-3 bg-gray-50 rounded border"></div>
                        </div>
                    </div>
                </div>

                <div id="random-settings" class="hidden absolute inset-0 bg-gray-50 p-4">
                    <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-sm border space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold">最小</label><input type="number" id="rand-min" value="1" class="w-full p-3 border rounded-xl"></div>
                            <div><label class="text-xs font-bold">最大</label><input type="number" id="rand-max" value="100" class="w-full p-3 border rounded-xl"></div>
                        </div>
                        <div><label class="text-xs font-bold">抽出個数</label><input type="number" id="rand-count" value="50" class="w-full p-3 border rounded-xl"></div>
                        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="rand-unique" checked> 重複を許可しない</label>
                        <div class="flex gap-2">
                            <button onclick="extractRandom()" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-bold">抽出</button>
                            <button id="copy-btn" onclick="copyRandom()" class="hidden bg-gray-200 px-6 rounded-xl font-bold">コピー</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- History -->
        <div id="history-container" class="w-80 bg-gray-50 flex flex-col border-l shrink-0">
            <div class="p-4 border-b bg-white flex justify-between items-center">
                <h3 class="font-bold text-sm">履歴</h3>
                <button onclick="clearHistory()" class="text-xs text-red-500">全消去</button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('display-input-editor');
        const resultArea = document.getElementById('math-result-area');
        const mathParser = math.create(math.all);
        let currentTab = 'scientific';
        let statsChart = null;
        let lastPyCalculatedField = null;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { 
                e.preventDefault(); 
                if (currentTab === 'scientific') execResult(); 
            }
        });

        const buttonLayout = [
            { type: 'config', span: 'col-span-2' },
            { label: 'Copy', action: "copyCalcResult()", type: 'ctrl', color: 'bg-blue-50 text-blue-600' },
            { label: 'Paste', action: "pasteToEditor()", type: 'ctrl', color: 'bg-blue-50 text-blue-600' },
            { label: 'AC', action: "clearAll()", type: 'ctrl', color: 'bg-red-50 text-red-600' },
            { label: '√', action: "insertText('√')", type: 'op' },
            { label: '^', action: "insertText('^')", type: 'sci' },
            { label: '!', action: "insertText('!')", type: 'sci' },
            { label: '(', action: "insertText('(')", type: 'sci' },
            { label: ')', action: "insertText(')')", type: 'sci' },
            { label: '7', action: "insertText('7')", type: 'num' },
            { label: '8', action: "insertText('8')", type: 'num' },
            { label: '9', action: "insertText('9')", type: 'num' },
            { label: '÷', action: "insertText('÷')", type: 'op' },
            { label: '⌫', action: "backspace()", type: 'ctrl', color: 'bg-orange-50 text-orange-600' },
            { label: '4', action: "insertText('4')", type: 'num' },
            { label: '5', action: "insertText('5')", type: 'num' },
            { label: '6', action: "insertText('6')", type: 'num' },
            { label: '×', action: "insertText('×')", type: 'op' },
            { label: '←', action: "moveCursor(-1)", type: 'ctrl' },
            { label: '1', action: "insertText('1')", type: 'num' },
            { label: '2', action: "insertText('2')", type: 'num' },
            { label: '3', action: "insertText('3')", type: 'num' },
            { label: '-', action: "insertText('-')", type: 'op' },
            { label: '→', action: "moveCursor(1)", type: 'ctrl' },
            { label: '□/□', action: "insertFraction()", type: 'sci', color: 'bg-blue-50 text-blue-600' },
            { label: '0', action: "insertText('0')", type: 'num' },
            { label: '.', action: "insertText('.')", type: 'num' },
            { label: '+', action: "insertText('+')", type: 'op' },
            { label: '=', action: "execResult()", type: 'eq', color: 'bg-blue-600 text-white' }
        ];

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.className = 'flex-1 py-4 text-center font-bold text-gray-500 hover:bg-gray-100 transition-colors');
            document.getElementById(`tab-${tab}`).className = 'flex-1 py-4 text-center font-bold tab-active';
            
            ['calc-buttons-container', 'stats-content', 'random-settings', 'sci-display-wrapper', 'py-display-wrapper', 'random-display-wrapper'].forEach(id => document.getElementById(id).classList.add('hidden'));
            const displaySection = document.getElementById('display-section');
            displaySection.classList.remove('hidden');

            if (tab === 'scientific') {
                document.getElementById('sci-display-wrapper').classList.remove('hidden');
                document.getElementById('calc-buttons-container').classList.remove('hidden');
            } else if (tab === 'pythagoras') {
                document.getElementById('py-display-wrapper').classList.remove('hidden');
                document.getElementById('calc-buttons-container').classList.remove('hidden');
            } else if (tab === 'stats') {
                displaySection.classList.add('hidden');
                document.getElementById('stats-content').classList.remove('hidden');
                updateStats();
            } else if (tab === 'random') {
                document.getElementById('random-display-wrapper').classList.remove('hidden');
                document.getElementById('random-settings').classList.remove('hidden');
            }
            if (tab === 'scientific' || tab === 'pythagoras') renderButtons();
        }

        function renderButtons() {
            const grid = document.getElementById('button-grid'); 
            grid.innerHTML = '';
            buttonLayout.forEach(btn => {
                if (btn.type === 'config') {
                    const div = document.createElement('div');
                    div.className = "flex flex-row justify-center items-center bg-gray-50 text-[10px] gap-2 px-1 border-b border-r col-span-2";
                    div.innerHTML = `
                        <label class="flex items-center gap-1 cursor-pointer select-none"><input type="checkbox" id="pref-fraction" onchange="execResult()"> 分数優先</label>
                        <label class="flex items-center gap-1 cursor-pointer select-none"><input type="checkbox" id="pref-root" checked onchange="execResult()"> √優先</label>
                    `;
                    grid.appendChild(div);
                    return;
                }
                const b = document.createElement('button');
                b.className = `calc-btn ${btn.span || ''} ${btn.color || 'bg-white text-gray-800'}`;
                b.innerText = btn.label;
                
                b.onmousedown = (e) => {
                    e.preventDefault(); 
                    if (btn.action.startsWith('insertText')) {
                        insertText(btn.action.match(/'(.*)'/)[1]);
                    } else {
                        eval(btn.action);
                    }
                };
                grid.appendChild(b);
            });
        }

        // フォーカスの位置を把握して正しい場所に挿入する
        function insertText(t) {
            if (currentTab === 'pythagoras') {
                const active = document.activeElement;
                if (active && active.id && active.id.startsWith('py-')) {
                    if (active.classList.contains('py-answer-mode')) {
                        clearPy();
                        document.getElementById(active.id).focus();
                    }
                    const start = active.selectionStart;
                    const end = active.selectionEnd;
                    active.value = active.value.substring(0, start) + t + active.value.substring(end);
                    active.selectionStart = active.selectionEnd = start + t.length;
                    active.dispatchEvent(new Event('input'));
                }
                return;
            }

            const sel = window.getSelection();
            let focusNode = sel.anchorNode;
            if (focusNode && focusNode.nodeType === 3) focusNode = focusNode.parentNode;
            
            // 現在のフォーカスがeditor内にない場合のみ、editor本体にフォーカスを当てる
            if (!editor.contains(focusNode)) {
                editor.focus();
                const range = document.createRange();
                range.selectNodeContents(editor);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }

            // 初期状態の0を消す（分数の枠内の0は消さない）
            if (editor.innerHTML === '0' && !['.', '!', '^', ')'].includes(t)) {
                editor.innerHTML = '';
            }

            document.execCommand('insertText', false, t);
        }

        function insertFraction() {
            const sel = window.getSelection();
            let focusNode = sel.anchorNode;
            if (focusNode && focusNode.nodeType === 3) focusNode = focusNode.parentNode;
            
            if (!editor.contains(focusNode)) editor.focus();
            if (editor.innerText === '0') editor.innerHTML = '';
            
            const id = 'frac-' + Date.now();
            const html = `<span class="input-frac" id="${id}" contenteditable="false"><span class="num" contenteditable="true"></span><span class="den" contenteditable="true"></span></span>&nbsp;`;
            document.execCommand('insertHTML', false, html);
            
            setTimeout(() => {
                const frac = document.getElementById(id);
                if (frac) {
                    frac.removeAttribute('id');
                    const num = frac.querySelector('.num');
                    num.focus();
                }
            }, 10);
        }

        function backspace() { 
            if (currentTab === 'pythagoras') {
                const active = document.activeElement;
                if (active && active.id.startsWith('py-')) {
                    const start = active.selectionStart;
                    if (start > 0) {
                        active.value = active.value.substring(0, start - 1) + active.value.substring(start);
                        active.selectionStart = active.selectionEnd = start - 1;
                        active.dispatchEvent(new Event('input'));
                    }
                }
                return;
            }

            const sel = window.getSelection();
            let focusNode = sel.anchorNode;
            if (focusNode && focusNode.nodeType === 3) focusNode = focusNode.parentNode;
            if (!editor.contains(focusNode)) {
                editor.focus();
                const range = document.createRange();
                range.selectNodeContents(editor);
                range.collapse(false);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            document.execCommand('delete', false, null); 
        }

        function clearAll() { 
            if (currentTab === 'pythagoras') { clearPy(); return; }
            editor.innerHTML = '0'; resultArea.innerHTML = ''; 
        }

        function moveCursor(dir) {
            const sel = window.getSelection();
            if(sel.rangeCount > 0){
                sel.modify("move", dir > 0 ? "forward" : "backward", "character");
            }
        }

        function getFormula() {
            let formula = "";
            const traverse = (nodeList) => {
                nodeList.forEach(node => {
                    if (node.nodeType === 3) formula += node.textContent;
                    else if (node.classList && node.classList.contains('input-frac')) {
                        const n = node.querySelector('.num').innerText.trim() || '0';
                        const d = node.querySelector('.den').innerText.trim() || '1';
                        if (formula.length > 0 && /[0-9]/.test(formula.trim().slice(-1))) formula += "+";
                        formula += `((${n})/(${d}))`;
                    } else if (node.hasChildNodes()) traverse(node.childNodes);
                });
            };
            traverse(editor.childNodes);
            return formula.replace(/\u200B/g, '').replace(/√(\d+\.?\d*)/g, 'sqrt($1)').replace(/√/g, 'sqrt').replace(/×/g, '*').replace(/÷/g, '/');
        }

        // nerdamerの出力をHTMLフォーマットに変換
        function formatNerdamerOutput(str, isInputTarget = false) {
            let s = str;
            s = s.replace(/sqrt\(([^)]+)\)/g, '√$1');
            s = s.replace(/(\d+)\s*\*\s*√/g, '$1√');
            s = s.replace(/\*/g, '×');
            
            if (!isInputTarget) {
                // (a+b)/c の形
                s = s.replace(/\(([^)]+)\)\/([0-9a-zA-Z√]+)/g, '<span class="math-frac"><span class="num">$1</span><span class="den">$2</span></span>');
                // a/b の形
                s = s.replace(/([0-9a-zA-Z√]+)\/([0-9a-zA-Z√]+)/g, '<span class="math-frac"><span class="num">$1</span><span class="den">$2</span></span>');
                s = s.replace(/\//g, '÷'); // 残ったスラッシュは割り算記号へ
            }
            return s;
        }

        function formatVal(v, useFrac, useRoot) {
            if (typeof v !== 'number') return v.toString();
            if (useFrac) {
                try {
                    const f = math.fraction(v);
                    if (f.d !== 1 && f.d < 10000) return `<span class="math-frac"><span class="num">${f.s * f.n}</span><span class="den">${f.d}</span></span>`;
                } catch {}
            }
            return parseFloat(v.toFixed(10)).toString();
        }

        function execResult() {
            try {
                const rawFormula = getFormula();
                if (!rawFormula.trim() || rawFormula === '0') return;

                const useRoot = document.getElementById('pref-root').checked;
                const useFrac = document.getElementById('pref-fraction').checked;

                let display = "";

                if (useRoot || useFrac) {
                    try {
                        let eq = nerdamer(rawFormula);
                        let textRes = eq.text('fractions'); // 8+2*sqrt(2) などの形式で取得

                        const hasSqrt = textRes.includes('sqrt');
                        
                        if (!useRoot && hasSqrt) {
                            // √を使わない設定なのに結果に√が含まれる場合はmath.jsで小数化
                            display = formatVal(mathParser.evaluate(rawFormula), useFrac, false);
                        } else if (!useFrac && textRes.includes('/') && !hasSqrt) {
                            // 分数を使わない設定で、ルートもない場合は小数化
                            display = formatVal(mathParser.evaluate(rawFormula), false, false);
                        } else {
                            // シンボリック計算の結果を整形して表示
                            display = formatNerdamerOutput(textRes, false);
                        }
                    } catch (err) {
                        display = formatVal(mathParser.evaluate(rawFormula), useFrac, useRoot);
                    }
                } else {
                    display = formatVal(mathParser.evaluate(rawFormula), false, false);
                }

                resultArea.innerHTML = display;
                addToHistory(editor.innerHTML, display);
            } catch (e) { 
                resultArea.innerHTML = '<span class="text-red-500 text-xs">Error</span>'; 
            }
        }

        function addToHistory(h, r) {
            const div = document.createElement('div');
            div.className = 'bg-white p-3 rounded-xl shadow-sm border border-gray-100 cursor-pointer';
            div.innerHTML = `<div class="truncate text-gray-400 text-[10px] mb-1">${h}</div><div class="font-bold text-blue-600 text-right text-lg">= ${r}</div>`;
            div.onclick = () => { editor.innerHTML = h; execResult(); };
            document.getElementById('history-list').prepend(div);
        }

        function clearHistory() { document.getElementById('history-list').innerHTML = ''; }

        // --- PYTHAGORAS ---
        function clearPy() {
            ['py-a', 'py-b', 'py-c'].forEach(id => {
                const el = document.getElementById(id);
                el.value = "";
                el.classList.remove('py-answer-mode');
            });
            lastPyCalculatedField = null;
        }

        function handlePyFocus(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('py-answer-mode')) {
                clearPy();
            }
        }

        function handlePyInput(id) {
            const fa = document.getElementById('py-a'), fb = document.getElementById('py-b'), fc = document.getElementById('py-c');
            
            if (lastPyCalculatedField && lastPyCalculatedField !== 'py-'+id) {
                const last = document.getElementById(lastPyCalculatedField);
                if (last && last.classList.contains('py-answer-mode')) {
                    last.classList.remove('py-answer-mode');
                }
            }

            const useRoot = document.getElementById('pref-root').checked;
            const useFrac = document.getElementById('pref-fraction').checked;

            const formatRes = (formulaStr) => {
                try {
                    let eq = nerdamer(formulaStr);
                    if (useRoot || useFrac) {
                        let textRes = eq.text('fractions');
                        if (!useRoot && textRes.includes('sqrt')) {
                            return parseFloat(Number(nerdamer(formulaStr).evaluate().text()).toFixed(10)).toString();
                        }
                        return formatNerdamerOutput(textRes, true); // input用のためタグ無し
                    } else {
                        return parseFloat(Number(nerdamer(formulaStr).evaluate().text()).toFixed(10)).toString();
                    }
                } catch(e) { return ""; }
            };

            const getEqStr = (val) => {
                if(!val) return '';
                return val.replace(/√(\d+)/g, 'sqrt($1)')
                          .replace(/√\(([^)]+)\)/g, 'sqrt($1)')
                          .replace(/×/g, '*')
                          .replace(/÷/g, '/');
            };

            try {
                const aReady = fa.value.trim() !== "";
                const bReady = fb.value.trim() !== "";
                const cReady = fc.value.trim() !== "";

                let target = null;
                if (aReady && bReady && !cReady) target = 'c';
                else if (aReady && cReady && !bReady) target = 'b';
                else if (bReady && cReady && !aReady) target = 'a';
                
                if (!target && lastPyCalculatedField && lastPyCalculatedField !== 'py-'+id) {
                   if(lastPyCalculatedField === 'py-c' && aReady && bReady) target = 'c';
                   else if(lastPyCalculatedField === 'py-b' && aReady && cReady) target = 'b';
                   else if(lastPyCalculatedField === 'py-a' && bReady && cReady) target = 'a';
                }

                const setRes = (el, formulaStr) => {
                    const res = formatRes(formulaStr);
                    if(res) {
                        el.value = res;
                        el.classList.add('py-answer-mode');
                    }
                };

                if (target === 'c') { setRes(fc, `sqrt((${getEqStr(fa.value)})^2 + (${getEqStr(fb.value)})^2)`); lastPyCalculatedField = 'py-c'; }
                else if (target === 'b') { setRes(fb, `sqrt((${getEqStr(fc.value)})^2 - (${getEqStr(fa.value)})^2)`); lastPyCalculatedField = 'py-b'; }
                else if (target === 'a') { setRes(fa, `sqrt((${getEqStr(fc.value)})^2 - (${getEqStr(fb.value)})^2)`); lastPyCalculatedField = 'py-a'; }

            } catch (e) {
                // エラーは無視して入力を続行させる
            }
        }

        // --- STATS ---
        function updateStats() {
            const inputTxt = document.getElementById('stats-data-input').value;
            const data = inputTxt.split(/[\s,]+/).filter(s => s.trim() !== "").map(Number).filter(n => !isNaN(n));
            const ctx = document.getElementById('stats-chart').getContext('2d');
            
            if (statsChart) statsChart.destroy();
            
            if (data.length === 0) {
                document.getElementById('stat-freq-table').innerHTML = "";
                document.getElementById('stats-summary-list').innerText = "";
                const boxCanvas = document.getElementById('box-plot-canvas');
                boxCanvas.getContext('2d').clearRect(0,0,boxCanvas.width,boxCanvas.height);
                statsChart = new Chart(ctx, { type: 'bar', data: { labels: [], datasets: [] } });
                return;
            }

            const sorted = [...data].sort((a,b)=>a-b);
            const avg = math.mean(data), med = math.median(data), min = sorted[0], max = sorted[sorted.length-1], q1 = math.quantileSeq(data, 0.25), q3 = math.quantileSeq(data, 0.75);
            
            document.getElementById('stats-summary-list').innerText = `最大値: ${max}\n第3四分位数: ${q3}\n中央値: ${med}\n第1四分位数: ${q1}\n最小値: ${min}\n平均値: ${avg.toFixed(3)}`;
            
            const binW = parseFloat(document.getElementById('bin-width-input').value) || 10;
            const showPoly = document.getElementById('show-freq-poly').checked;
            
            const minVal = Math.min(...data);
            const maxVal = Math.max(...data);
            const start = Math.floor(minVal / binW) * binW;
            const end = Math.ceil(maxVal / binW) * binW + (maxVal % binW === 0 ? binW : 0);

            const bins = [];
            let totalFreq = 0;
            
            for (let x = start; x < end; x += binW) {
                const count = data.filter(d => d >= x && d < x + binW).length;
                bins.push({ x: x + binW/2, y: count, min: x, max: x + binW });
                totalFreq += count;
            }

            let tableHtml = `<tr><th>階級</th><th>度数</th></tr>`;
            bins.forEach(b => tableHtml += `<tr><td>${b.min}~${b.max}</td><td>${b.y}</td></tr>`);
            tableHtml += `<tr class="total-row"><td>合計</td><td>${totalFreq}</td></tr>`;
            document.getElementById('stat-freq-table').innerHTML = tableHtml;

            const barData = bins.map(b => ({ x: b.x, y: b.y }));
            const lineData = bins.map(b => ({ x: b.x, y: b.y }));

            statsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    datasets: [
                        {
                            label: '度数',
                            data: barData,
                            backgroundColor: 'rgba(59, 130, 246, 0.4)',
                            borderColor: '#3b82f6',
                            borderWidth: 1,
                            barPercentage: 1.0, 
                            categoryPercentage: 1.0
                        },
                        ...(showPoly ? [{
                            type: 'line',
                            label: '多角形',
                            data: lineData,
                            borderColor: '#ef4444',
                            borderWidth: 2,
                            tension: 0,
                            fill: false,
                            pointRadius: 4
                        }] : [])
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        x: { 
                            type: 'linear',
                            offset: false,
                            grid: { offset: false },
                            ticks: { stepSize: binW },
                            min: start,
                            max: bins[bins.length-1].max
                        },
                        y: { beginAtZero: true, ticks: { stepSize: 1 } } 
                    }, 
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (items) => `階級値: ${items[0].parsed.x}`,
                                label: (item) => `度数: ${item.parsed.y}`
                            }
                        }
                    } 
                }
            });
            drawBoxPlot(min, q1, med, q3, max, avg);
        }

        function drawBoxPlot(min, q1, med, q3, max, avg) {
            const canvas = document.getElementById('box-plot-canvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.parentElement.clientWidth, H = canvas.parentElement.clientHeight;
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
            ctx.scale(2, 2);
            ctx.clearRect(0,0,W,H);
            
            const margin = 50, range = (max - min) || 1;
            const scale = (v) => margin + ((v - min) / range) * (W - margin * 2);
            const y = H / 2, h = 40;

            ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5; ctx.font = '10px Roboto Mono'; ctx.textAlign = 'center';
            ctx.strokeRect(scale(q1), y-h/2, scale(q3)-scale(q1), h);
            ctx.beginPath(); ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3;
            ctx.moveTo(scale(med), y-h/2); ctx.lineTo(scale(med), y+h/2); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#10b981'; ctx.lineWidth = 2;
            const mx = scale(avg), size = 6;
            ctx.moveTo(mx - size, y - size); ctx.lineTo(mx + size, y + size);
            ctx.moveTo(mx + size, y - size); ctx.lineTo(mx - size, y + size);
            ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
            ctx.moveTo(scale(min), y); ctx.lineTo(scale(q1), y);
            ctx.moveTo(scale(q3), y); ctx.lineTo(scale(max), y);
            ctx.moveTo(scale(min), y-10); ctx.lineTo(scale(min), y+10);
            ctx.moveTo(scale(max), y-10); ctx.lineTo(scale(max), y+10);
            ctx.stroke();
            ctx.fillStyle = '#1e293b';
            [[min, "最小値"], [q1, "第1"], [med, "中央"], [q3, "第3"], [max, "最大値"]].forEach(([v, l]) => {
                ctx.fillText(v, scale(v), y + h/2 + 15);
            });
            ctx.fillStyle = '#059669';
            ctx.fillText(`平均:${avg.toFixed(2)}`, scale(avg), y + h/2 + 30);
        }

        // --- RANDOM ---
        function extractRandom() {
            const min = parseInt(document.getElementById('rand-min').value), max = parseInt(document.getElementById('rand-max').value), count = parseInt(document.getElementById('rand-count').value), unique = document.getElementById('rand-unique').checked;
            let res = [];
            const r = max - min + 1;
            if (unique && count > r) { showMsg(`個数が範囲を超えています`); return; }
            while (res.length < count) {
                const v = Math.floor(Math.random() * r) + min;
                if (!unique || !res.includes(v)) res.push(v);
            }
            document.getElementById('random-results').innerText = res.sort((a,b)=>a-b).join(', ');
            document.getElementById('copy-btn').classList.remove('hidden');
        }

        function copyCalcResult() {
            const t = resultArea.innerText;
            if(!t) return;
            const dummy = document.createElement('textarea');
            dummy.style.position = 'fixed'; dummy.style.opacity = '0';
            document.body.appendChild(dummy); dummy.value = t; dummy.select();
            document.execCommand('copy'); document.body.removeChild(dummy);
            showMsg('コピーしました');
        }

        async function pasteToEditor() {
            try {
                const t = await navigator.clipboard.readText();
                if(t) insertText(t);
            } catch { showMsg('ペースト失敗'); }
        }

        function copyRandom() {
            const t = document.getElementById('random-results').innerText;
            const dummy = document.createElement('textarea');
            dummy.style.position = 'fixed'; dummy.style.opacity = '0';
            document.body.appendChild(dummy); dummy.value = t; dummy.select();
            document.execCommand('copy'); document.body.removeChild(dummy);
            showMsg('コピーしました');
        }

        function showMsg(m) {
            const b = document.getElementById('msg-box'); b.innerText = m; b.style.display = 'block'; b.style.opacity = '1';
            setTimeout(() => { b.style.opacity = '0'; setTimeout(()=>b.style.display='none', 300); }, 2000);
        }

        window.onload = () => switchTab('scientific');
    </script>
